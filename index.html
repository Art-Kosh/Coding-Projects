<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Projects!</title>
    <link rel="icon" href="images/icon.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Single:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <h1>My Coding Projects!</h1>
    <a href="https://studio.code.org/projects/applab/d62e5c14-101a-49e6-9bf3-4ed0ada10620" target="_blank" class="button">G10 MidTerm Summative Project</a>
    <a href="https://studio.code.org/projects/gamelab/f10401ab-95f7-4b0f-a3f3-9f14953fb467" target="_blank" class="button">G10 Final Project</a>
    <a href="Grade Calc/calc.html" target="_blank" class="button">Average Calculator</a>
    <a href="Game/game.html" target="_blank" class="button">Godot Test Game</a>
    <script>
      // Fix entrance animation — once played, set opacity directly so nothing resets it
      document.querySelectorAll('a[href]').forEach(link => {
        link.addEventListener('animationend', function handler(e) {
          if (e.animationName === 'cardSlideIn') {
            this.style.opacity = '1';
            this.removeEventListener('animationend', handler);
          }
        });

        link.addEventListener('click', function(e) {
          if (this.dataset.navigating) return;

          e.preventDefault();
          e.stopImmediatePropagation();
          this.dataset.navigating = 'true';

          // Apply tap style directly
          this.style.transform = 'translateY(-3px) scale(1.04)';
          this.style.borderColor = 'rgba(200, 255, 0, 0.3)';
          this.style.boxShadow = '0 6px 24px var(--accent-glow)';
          this.querySelector('::after'); // force repaint
          void this.offsetHeight;

          const el = this;
          const href = this.getAttribute('href');
          const target = this.getAttribute('target');

          setTimeout(() => {
            // Reset styles
            el.style.transform = '';
            el.style.borderColor = '';
            el.style.boxShadow = '';
            delete el.dataset.navigating;

            setTimeout(() => {
              if (target === '_blank') {
                window.open(href, '_blank', 'noopener');
              } else {
                window.location.href = href;
              }
            }, 150);
          }, 200);
        }, true);
      });

      // Clean up on swipe-back / tab return
      window.addEventListener('pageshow', function() {
        document.querySelectorAll('a[href]').forEach(link => {
          link.style.transform = '';
          link.style.borderColor = '';
          link.style.boxShadow = '';
          delete link.dataset.navigating;
        });
      });
    </script>
  </body>
</html>
