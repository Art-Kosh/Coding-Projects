    <script>
      // Set opacity after entrance animation so it can't be reset
      document.querySelectorAll('a[href]').forEach(link => {
        link.addEventListener('animationend', function handler(e) {
          if (e.animationName === 'cardSlideIn') {
            this.style.opacity = '1';
            this.removeEventListener('animationend', handler);
          }
        });
      });

      // Clean up on return to page
      function resetAll() {
        document.querySelectorAll('a[href]').forEach(link => {
          link.blur();
          link.classList.remove('pressed');
        });
      }
      window.addEventListener('pageshow', resetAll);
      window.addEventListener('focus', resetAll);
      document.addEventListener('visibilitychange', () => {
        if (!document.hidden) resetAll();
      });
    </script>
