<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Projects!</title>
    <link rel="icon" href="images/icon.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Single:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <h1>My Coding Projects!</h1>
    <a href="https://studio.code.org/projects/applab/d62e5c14-101a-49e6-9bf3-4ed0ada10620" target="_blank" class="button">G10 MidTerm Summative Project</a>
    <a href="https://studio.code.org/projects/gamelab/f10401ab-95f7-4b0f-a3f3-9f14953fb467" target="_blank" class="button">G10 Final Project</a>
    <a href="Grade Calc/calc.html" target="_blank" class="button">Average Calculator</a>
    <a href="Game/game.html" target="_blank" class="button">Godot Test Game</a>
    <script>
      let lastTouchTime = 0;
      let pendingNav = null;
      const links = document.querySelectorAll('a[href]');

      document.addEventListener('touchstart', () => {
        lastTouchTime = Date.now();
      }, { passive: true });

      links.forEach(link => {
        link.addEventListener('click', function(e) {
          if (Date.now() - lastTouchTime > 500) return;

          e.preventDefault();
          if (pendingNav) clearTimeout(pendingNav);

          links.forEach(a => a.removeAttribute('style'));

          const el = this;
          const href = this.getAttribute('href');
          const target = this.getAttribute('target');

          requestAnimationFrame(() => {
            Object.assign(el.style, {
              scale: '1.05',
              translate: '0 -1px',
              borderColor: 'rgba(200,255,0,0.3)',
              boxShadow: '0 6px 24px rgba(200,255,0,0.15)'
            });

            pendingNav = setTimeout(() => {
              pendingNav = null;
              if (target === '_blank') {
                const w = window.open(href, '_blank', 'noopener');
                if (!w) window.location.href = href;
              } else {
                window.location.href = href;
              }
            }, 250);
          });
        });
      });

      document.body.addEventListener('click', e => {
        if (Date.now() - lastTouchTime > 500) return;
        if (e.target.closest('a[href]')) return;
        if (pendingNav) clearTimeout(pendingNav);
        pendingNav = null;
        links.forEach(a => a.removeAttribute('style'));
      });
    </script>
  </body>
</html>
