<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Average Calculator</title>
    <link rel="icon" href="images/icon.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Single:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="main/styles.css">
    <script src="script.js" defer></script>
  </head>
  <body>
    <h1>Average Calculator</h1>
    <h2>Put A Comma After Each Grade</h2>
    <label for="grades">Grades:</label>
    <input type="text" id="grades" name="grades">
    <a target="_blank" class="button" id="calculate">Calculate Average</a>
    <label>Average: <span id="average"></span></label>
  </body>
</html>
