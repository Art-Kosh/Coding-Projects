<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Average Calculator</title>
    <link rel="icon" href="images/icon.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Single:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="calc.css">
    <script src="script.js" defer></script>
  </head>
  <body>
    <h1>Average Calculator</h1>
    <h2>Put a Comma After Each Grade</h2>
    <label for="grades">Grades: <input type="text" id="grades" name="grades" style="width: 100px"></label>
    <a id="calc" class="button">Average: <span id="average"></span></a>
    <script>
      let lastTouch = 0;
      document.addEventListener('touchstart', () => {
        lastTouch = Date.now();
      }, { passive: true });

      document.body.addEventListener('click', e => {
        if (Date.now() - lastTouch > 500) return;
        const calc = document.getElementById('calc');
        if (!e.target.closest('#calc')) {
          calc.removeAttribute('style');
        }
      });
    </script>
  </body>
</html>
